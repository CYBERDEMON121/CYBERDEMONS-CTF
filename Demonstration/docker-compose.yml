services:

  vulnweb:
    build: ./vulnerable-webapp
    container_name: vulnweb
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    networks:
      - vulnlab
    restart: unless-stopped

  mysql:
    image: mysql:5.7
    container_name: vulnweb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: vulnapp
      MYSQL_USER: vulnuser
      MYSQL_PASSWORD: vulnpass
    ports:
      - "3307:3306"
    networks:
      - vulnlab
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql

  ftp:
    image: fauria/vsftpd
    container_name: vulnweb-ftp
    environment:
      FTP_USER: ftpuser
      FTP_PASS: ftppass123
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    networks:
      - vulnlab
    restart: unless-stopped

  ssh:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: vulnweb-ssh
    environment:
      PUID: 1000
      PGID: 1000
      USER_NAME: sshuser
      USER_PASS: sshpass123
      PASSWORD_ACCESS: "true"
    ports:
      - "2222:2222"
    networks:
      - vulnlab
    restart: unless-stopped

  wordpress:
    image: wordpress:latest
    container_name: vulnweb-wordpress
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: vulnuser
      WORDPRESS_DB_PASSWORD: vulnpass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "true"
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - vulnlab
    restart: unless-stopped

  metasploitable:
    image: tleemcjr/metasploitable2
    container_name: vulnweb-metasploitable
    hostname: metasploitable
    entrypoint: /bin/bash -c "/bin/services.sh; tail -f /dev/null"
    ports:
      - "81:80"
      - "2122:21"
      - "2223:22"
      - "2323:23"
      - "2525:25"
      - "1110:110"
      - "1390:139"
      - "4450:445"
      - "3308:3306"
      - "5434:5432"
      - "8081:8080"
      - "8444:8443"
    networks:
      - vulnlab
    restart: unless-stopped

networks:
  vulnlab:
    name: vulnlab-network
    driver: bridge

volumes:
  uploads:
  mysql-data:
